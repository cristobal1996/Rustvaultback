version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       rustvaultdb
      POSTGRES_USER:     rustvaultuser
      POSTGRES_PASSWORD: rustvaultpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultuser -d rustvaultdb"]
      interval: 5s
      timeout:  5s
      retries:  5

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL:    postgres://rustvaultuser:rustvaultpass@postgres:5432/rustvaultdb
      JWT_SECRET:      12345678900987654321
      PORT:            8080
      ENV:             development
      RUST_LOG:        rustvault=debug,tower_http=info,sqlx=warn
      CLEANUP_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout:  5s
      retries:  3

volumes:
  pgdata:
